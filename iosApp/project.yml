name: iosApp
options:
  bundleIdPrefix: net.shino3
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

configFiles:
  Debug: Configuration/Config.xcconfig
  Release: Configuration/Config.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: $(APP_NAME)
        CFBundleName: $(APP_NAME)
        CFBundleShortVersionString: "0.1.0"
        CFBundleVersion: "1"
        # Compose Multiplatform 必須: 未指定だと PlistSanityCheck が例外を投げてクラッシュする
        # （ProMotion 120Hz を有効化するためのフラグ）。
        CADisableMinimumFrameDurationOnPhone: true
        # 暗背景アプリなのでステータスバー文字は明色固定。
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID)
        PRODUCT_NAME: $(APP_NAME)
        DEVELOPMENT_TEAM: $(TEAM_ID)
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # KMP 静的フレームワーク（ComposeApp）の探索/リンク。埋め込みは preBuildScripts の gradle が行う。
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - ComposeApp
          - -lsqlite3
    preBuildScripts:
      - name: Compile Kotlin Framework
        basedOnDependencyAnalysis: false
        script: |
          # Xcode の非ログインシェルでは JAVA_HOME 未設定なことがあるため補う。
          if [ -z "$JAVA_HOME" ]; then
            export JAVA_HOME="/Applications/Android Studio.app/Contents/jbr/Contents/Home"
          fi
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
