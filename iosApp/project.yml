name: iosApp
options:
  bundleIdPrefix: net.shino3
  deploymentTarget:
    iOS: "15.0"
  createIntermediateGroups: true

configFiles:
  Debug: Configuration/Config.xcconfig
  Release: Configuration/Config.xcconfig

settings:
  base:
    SWIFT_VERSION: "5.0"
    # 表示バージョンとビルド番号。TestFlight は build 番号の単調増加が必須なので、
    # アップロード時に scripts/testflight.sh が -PbuildNumber 相当で CURRENT_PROJECT_VERSION を上書きする。
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"

targets:
  iosApp:
    type: application
    platform: iOS
    sources:
      - path: iosApp
    info:
      path: iosApp/Info.plist
      properties:
        CFBundleDisplayName: $(APP_NAME)
        CFBundleName: $(APP_NAME)
        CFBundleShortVersionString: $(MARKETING_VERSION)
        CFBundleVersion: $(CURRENT_PROJECT_VERSION)
        # 暗号の輸出コンプライアンス: 標準TLSと Nostr 署名(secp256k1)のみで独自暗号は持たない。
        # false にすると TestFlight アップロード毎の輸出コンプライアンス質問を省ける（法的宣言）。
        ITSAppUsesNonExemptEncryption: false
        # 画像を写真ライブラリへ保存する際の利用目的（未設定だと保存時にクラッシュ）。追加のみ。
        NSPhotoLibraryAddUsageDescription: 画像を写真ライブラリに保存するために使用します。
        # Compose Multiplatform 必須: 未指定だと PlistSanityCheck が例外を投げてクラッシュする
        # （ProMotion 120Hz を有効化するためのフラグ）。
        CADisableMinimumFrameDurationOnPhone: true
        # [#200] nostr: URL スキームを登録（他アプリの nostr:npub…/note…/naddr… タップで起動）。
        # TODO(iOS): iOSApp.swift 側で .onOpenURL { url } を受け、url.absoluteString から
        # "nostr:" 以降の bech を取り出して ExternalIntents.post(...) 相当へ流す配線が未実装。
        # Android の MainActivity.handleExternalIntent と同じ分岐（npub/nprofile→OpenProfile,
        # note/nevent→OpenEvent, naddr→OpenAddr）を Kotlin 側の共通ヘルパに切り出して共有するのが望ましい。
        CFBundleURLTypes:
          - CFBundleTypeRole: Viewer
            CFBundleURLName: net.shino3.nostrism.nostr
            CFBundleURLSchemes:
              - nostr
        # 暗背景アプリなのでステータスバー文字は明色固定。
        UIStatusBarStyle: UIStatusBarStyleLightContent
        UIViewControllerBasedStatusBarAppearance: false
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: $(BUNDLE_ID)
        PRODUCT_NAME: $(APP_NAME)
        DEVELOPMENT_TEAM: $(TEAM_ID)
        CODE_SIGN_STYLE: Automatic
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_USER_SCRIPT_SANDBOXING: NO
        # KMP 静的フレームワーク（ComposeApp）の探索/リンク。埋め込みは preBuildScripts の gradle が行う。
        FRAMEWORK_SEARCH_PATHS:
          - $(inherited)
          - $(SRCROOT)/../composeApp/build/xcode-frameworks/$(CONFIGURATION)/$(SDK_NAME)
        OTHER_LDFLAGS:
          - $(inherited)
          - -framework
          - ComposeApp
          - -lsqlite3
    preBuildScripts:
      - name: Compile Kotlin Framework
        basedOnDependencyAnalysis: false
        script: |
          # Xcode の非ログインシェルでは JAVA_HOME 未設定なことがあるため補う。
          if [ -z "$JAVA_HOME" ]; then
            export JAVA_HOME="/Applications/Android Studio.app/Contents/jbr/Contents/Home"
          fi
          cd "$SRCROOT/.."
          ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode
