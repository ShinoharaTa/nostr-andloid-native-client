<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Nostr Deck — Design Mock</title>
<link rel="stylesheet" href="tokens.css">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font);
  background: radial-gradient(1200px 800px at 70% -10%, #15131f 0%, #08080b 60%);
  color: var(--text);
  -webkit-font-smoothing: antialiased;
  padding: 40px 28px 80px;
  min-height: 100vh;
}
.page-head { max-width: 1100px; margin: 0 auto 8px; }
.page-head h1 { font-size: 22px; letter-spacing: .2px; }
.page-head p { color: var(--text-2); font-size: 13.5px; margin-top: 6px; line-height: 1.6; }
.legend { display:flex; gap:18px; flex-wrap:wrap; margin-top:14px; font-size:12px; color:var(--text-3); }
.legend b { color: var(--accent); font-weight:600; }

.stage {
  display: flex; gap: 56px; align-items: flex-start;
  overflow-x: auto; padding: 44px 4px 24px;
  scrollbar-width: thin;
}
.frame { flex: 0 0 auto; }
.frame-label { text-align:center; color: var(--text-2); font-size: 12.5px; margin-bottom: 14px; }
.frame-label b { color: var(--text); display:block; font-size:14px; margin-bottom:3px; }

/* device shells */
.device {
  background: #000; border-radius: 38px; padding: 12px;
  box-shadow: 0 30px 70px -20px rgba(0,0,0,.8), 0 0 0 1px #1c1c24;
  position: relative;
}
.screen {
  background: var(--bg); border-radius: 28px; overflow: hidden;
  position: relative; display: flex; flex-direction: column;
  height: 740px;
}
.phone .screen { width: 300px; }              /* folded ~ compact */
.fold .screen  { width: 720px; }              /* unfolded foldable ~ expanded */
.tablet .screen{ width: 980px; height: 700px;}/* iPad / Stage Manager */

/* status bar */
.statusbar {
  height: 30px; display:flex; align-items:center; justify-content:space-between;
  padding: 0 18px; font-size: 11.5px; color: var(--text-2); flex: 0 0 auto;
}
.statusbar .right { display:flex; gap:6px; align-items:center; }
.notch { position:absolute; top:12px; left:50%; transform:translateX(-50%);
  width:90px; height:22px; background:#000; border-radius:0 0 14px 14px; z-index:5; }

/* hinge line for the unfolded foldable */
.hinge { position:absolute; top:0; bottom:0; width: var(--hinge-gutter);
  left:50%; transform:translateX(-50%); z-index:4; pointer-events:none;
  background: linear-gradient(90deg, transparent, rgba(0,0,0,.28) 40%, rgba(0,0,0,.28) 60%, transparent);
}
.hinge::after { content:""; position:absolute; left:50%; top:0; bottom:0; width:1px;
  transform:translateX(-50%); background: rgba(255,255,255,.05); }

/* ---------- compact (folded) single-column SNS ---------- */
.appbar {
  flex:0 0 auto; display:flex; align-items:center; gap:10px;
  padding: 6px 14px 10px; border-bottom:1px solid var(--border);
}
.appbar .title { font-size:17px; font-weight:700; }
.appbar .spacer { flex:1; }
.icon-btn { width:32px;height:32px;border-radius:var(--r-full); display:grid;place-items:center;
  color:var(--text-2); background:transparent; }
.icon-btn:hover{ background:var(--surface-3); color:var(--text); }
.tabs { display:flex; gap:4px; padding:8px 10px; overflow-x:auto; flex:0 0 auto;
  border-bottom:1px solid var(--border); scrollbar-width:none; }
.tabs::-webkit-scrollbar{ display:none; }
.chip { flex:0 0 auto; font-size:12.5px; color:var(--text-2); padding:6px 12px;
  border-radius:var(--r-full); background:var(--surface-2); white-space:nowrap; }
.chip.active{ background:var(--accent-weak); color:var(--accent); font-weight:600; }

.feed { flex:1; overflow-y:auto; scrollbar-width:thin; }

.bottomnav {
  flex:0 0 auto; display:flex; justify-content:space-around; align-items:center;
  padding:8px 6px 12px; border-top:1px solid var(--border); background:var(--surface);
}
.bottomnav .icon-btn.active{ color:var(--accent); }
.fab { position:absolute; right:18px; bottom:74px; width:50px;height:50px;border-radius:var(--r-full);
  background:linear-gradient(135deg,var(--accent),var(--accent-2)); color:#fff; display:grid;place-items:center;
  box-shadow:0 10px 24px -6px rgba(168,85,247,.6); font-size:22px; z-index:6; }

/* ---------- deck (expanded) ---------- */
.deck { flex:1; display:flex; overflow-x:auto; overflow-y:hidden; scrollbar-width:thin; }
.deck::-webkit-scrollbar{ height:8px; }
.deck::-webkit-scrollbar-thumb{ background:var(--border-strong); border-radius:4px; }
.column {
  flex:0 0 var(--column-w); width:var(--column-w);
  border-right:1px solid var(--border); display:flex; flex-direction:column;
  background:var(--surface);
}
.col-head {
  flex:0 0 auto; display:flex; align-items:center; gap:9px;
  padding:11px 13px; border-bottom:1px solid var(--border);
  background:linear-gradient(var(--surface), var(--surface-2));
  position:sticky; top:0;
}
.col-icon { width:26px;height:26px;border-radius:var(--r-sm); display:grid;place-items:center;
  background:var(--accent-weak); color:var(--accent); font-size:14px; }
.col-title { font-size:13.5px; font-weight:650; }
.col-sub { font-size:11px; color:var(--text-3); }
.col-head .grip { margin-left:auto; color:var(--text-3); cursor:grab; }
.col-body { flex:1; overflow-y:auto; scrollbar-width:thin; }
.add-col { flex:0 0 56px; width:56px; display:flex; flex-direction:column; align-items:center;
  padding-top:16px; gap:8px; color:var(--text-3); background:var(--surface); }
.add-col .plus { width:38px;height:38px;border-radius:var(--r-full); border:1.5px dashed var(--border-strong);
  display:grid;place-items:center; font-size:20px; }
.add-col span { writing-mode:vertical-rl; font-size:11px; letter-spacing:1px; margin-top:4px; }

/* ---------- note item (shared) ---------- */
.note { padding:12px 13px; border-bottom:1px solid var(--border); display:flex; gap:10px; }
.note:hover{ background:rgba(255,255,255,.018); }
.avatar { flex:0 0 auto; width:38px;height:38px;border-radius:var(--r-full); }
.note-main { flex:1; min-width:0; }
.note-head { display:flex; align-items:baseline; gap:6px; }
.name { font-size:13.5px; font-weight:650; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.handle { font-size:11.5px; color:var(--text-3); white-space:nowrap; }
.dot { color:var(--text-3); font-size:11px; }
.time { font-size:11.5px; color:var(--text-3); margin-left:auto; }
.body { font-size:13.5px; line-height:1.5; color:var(--text); margin-top:3px; word-wrap:break-word; }
.body .ment { color:var(--accent); }
.body .tag { color:var(--accent-2); }
.media { margin-top:9px; border-radius:var(--r-md); overflow:hidden; border:1px solid var(--border); }
.media .ph { height:150px; position:relative; }
.actions { display:flex; gap:4px; margin-top:8px; color:var(--text-3); }
.act { display:flex; align-items:center; gap:5px; font-size:11.5px; padding:4px 8px 4px 4px; border-radius:var(--r-full); }
.act:hover{ background:var(--surface-3); }
.act.z:hover{ color:var(--zap); } .act.r:hover{ color:var(--repost); } .act.l:hover{ color:var(--like); }
.act.c:hover{ color:var(--accent); }

/* loading skeleton (offline / cache-first 表現) */
.skeleton { padding:12px 13px; border-bottom:1px solid var(--border); display:flex; gap:10px; opacity:.5; }
.sk { background:linear-gradient(90deg,var(--surface-2),var(--surface-3),var(--surface-2));
  background-size:200% 100%; animation:sh 1.3s infinite; border-radius:6px; }
@keyframes sh { 0%{background-position:200% 0} 100%{background-position:-200% 0} }

.offline-pill { margin:8px 13px; padding:7px 11px; border-radius:var(--r-sm); font-size:11.5px;
  background:rgba(247,185,85,.1); color:var(--zap); display:flex; gap:7px; align-items:center; }

/* ---------- left navigation rail (expanded) ---------- */
.body-row { flex:1; display:flex; min-height:0; }
.rail { flex:0 0 60px; width:60px; background:var(--bg); border-right:1px solid var(--border);
  display:flex; flex-direction:column; align-items:center; padding:10px 0; gap:5px; overflow-y:auto; scrollbar-width:none; }
.rail::-webkit-scrollbar{ display:none; }
.rail .logo { width:34px;height:34px;border-radius:11px;
  background:linear-gradient(135deg,var(--accent),var(--accent-2)); margin-bottom:6px;
  display:grid;place-items:center;color:#fff;font-weight:800;font-size:17px; }
.rail-item { width:42px;height:42px;border-radius:13px; display:grid;place-items:center;
  color:var(--text-2); position:relative; cursor:pointer; }
.rail-item:hover{ background:var(--surface-2); color:var(--text); }
.rail-item.active{ background:var(--accent-weak); color:var(--accent); }
.rail-item.active::before{ content:""; position:absolute; left:-10px; top:9px;bottom:9px; width:3px;
  border-radius:2px; background:var(--accent); }
.rail-item .badge{ position:absolute; top:2px; right:2px; min-width:16px;height:16px; padding:0 3px;
  border-radius:8px; background:var(--like); color:#fff; font-size:9px; font-weight:700;
  display:grid;place-items:center; border:2px solid var(--bg); }
.rail-item .colav{ width:26px;height:26px;border-radius:8px; }
.rail-item .hash{ font-size:16px;font-weight:700; }
.rail-sep{ width:26px;height:1px;background:var(--border); margin:5px 0; flex:0 0 auto; }
.rail .spacer{ flex:1; }
.rail-item.add{ border:1.5px dashed var(--border-strong); color:var(--text-3); width:38px;height:38px;border-radius:var(--r-full); }
.rail-item.av{ padding:0; } .rail-item.av .colav{ width:34px;height:34px;border-radius:50%; }

/* ---------- thread column (NIP-10) ---------- */
.column.thread .col-icon{ background:rgba(74,222,128,.14); color:var(--repost); }
.note.root{ background:rgba(168,85,247,.05); }
.note.focused{ background:var(--accent-weak); box-shadow:inset 3px 0 0 var(--accent); }
.note.reply{ position:relative; }
.note.reply.depth1{ padding-left:34px; }
.note.reply.depth2{ padding-left:54px; }
.thread-line{ position:absolute; left:26px; top:0; bottom:0; width:2px; background:var(--border); }
.reply-to{ font-size:11px;color:var(--text-3); margin-bottom:3px; }
.reply-to b{ color:var(--accent); font-weight:600; }
.col-close{ margin-left:auto; color:var(--text-3); cursor:pointer; }

/* ---------- NIP-28: channel list ---------- */
.ch-row{ display:flex; gap:10px; padding:11px 13px; border-bottom:1px solid var(--border); align-items:center; cursor:pointer; }
.ch-row:hover{ background:rgba(255,255,255,.02); }
.ch-row.active{ background:var(--accent-weak); box-shadow:inset 3px 0 0 var(--accent); }
.ch-pic{ flex:0 0 auto; width:42px;height:42px;border-radius:12px; }
.ch-main{ flex:1; min-width:0; }
.ch-top{ display:flex; align-items:center; gap:6px; }
.ch-name{ font-size:13.5px; font-weight:650; }
.ch-meta{ margin-left:auto; font-size:10.5px; color:var(--text-3); }
.ch-last{ font-size:12px; color:var(--text-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; margin-top:2px; }
.ch-last b{ color:var(--text); font-weight:600; }
.ch-unread{ flex:0 0 auto; min-width:18px;height:18px;padding:0 5px; border-radius:9px; background:var(--accent);
  color:#fff; font-size:10px; font-weight:700; display:grid;place-items:center; }

/* ---------- NIP-28: channel room (chat) ---------- */
.column.room .col-icon{ background:rgba(247,185,85,.14); color:var(--zap); }
.column.room .col-body{ display:flex; flex-direction:column; padding:0; }
.room-scroll{ flex:1; overflow-y:auto; padding:10px 12px; display:flex; flex-direction:column; gap:2px; scrollbar-width:thin; }
.daysep{ text-align:center; font-size:10.5px; color:var(--text-3); margin:8px 0; }
.daysep span{ background:var(--surface-2); padding:3px 10px; border-radius:var(--r-full); }
.msg{ display:flex; gap:8px; margin-top:8px; }
.msg .avatar{ width:30px;height:30px; }
.msg-b{ max-width:78%; }
.msg-head{ display:flex; gap:6px; align-items:baseline; margin-bottom:2px; }
.msg-name{ font-size:12px; font-weight:650; color:var(--accent2,#8b5cf6); }
.msg-time{ font-size:10px; color:var(--text-3); }
.bubble{ background:var(--surface-2); border-radius:4px 12px 12px 12px; padding:7px 11px; font-size:13px; line-height:1.45; color:var(--text); }
.msg.cont{ margin-top:2px; } .msg.cont .avatar{ visibility:hidden; height:0; } .msg.cont .msg-head{ display:none; }
.msg.me{ flex-direction:row-reverse; }
.msg.me .bubble{ background:linear-gradient(135deg,var(--accent),var(--accent2,#8b5cf6)); color:#fff; border-radius:12px 4px 12px 12px; }
.msg.me .msg-head{ flex-direction:row-reverse; }
.composer{ flex:0 0 auto; display:flex; align-items:center; gap:8px; padding:9px 11px; border-top:1px solid var(--border); background:var(--surface); }
.composer .inp{ flex:1; background:var(--surface-2); border-radius:var(--r-full); padding:8px 14px; font-size:12.5px; color:var(--text-3); }
.composer .send{ width:34px;height:34px;border-radius:var(--r-full); background:linear-gradient(135deg,var(--accent),var(--accent2,#8b5cf6));
  color:#fff; display:grid;place-items:center; }

/* ---------- pin (固定) ---------- */
.head-btn{ width:28px;height:28px;border-radius:8px; display:grid;place-items:center; color:var(--text-3); cursor:pointer; }
.head-btn:hover{ background:var(--surface-3); color:var(--text); }
.head-btn.pinned{ color:var(--zap); }
.ch-pin{ flex:0 0 auto; width:28px;height:28px; display:grid;place-items:center; border-radius:8px; color:var(--text-3); cursor:pointer; }
.ch-pin:hover{ background:var(--surface-3); }
.ch-pin.on{ color:var(--zap); }
.rail-item .pindot{ position:absolute; bottom:1px; right:1px; width:9px;height:9px;border-radius:50%;
  background:var(--zap); border:2px solid var(--bg); }
.rail-label{ font-size:8.5px; color:var(--text-3); letter-spacing:1px; margin:2px 0 -1px; }

svg.i { width:16px; height:16px; stroke:currentColor; fill:none; stroke-width:1.8; stroke-linecap:round; stroke-linejoin:round; }
svg.i.sm { width:14px; height:14px; }
</style>
</head>
<body>

<div class="page-head">
  <h1>Nostr Deck — デザインモック</h1>
  <p>同一の Deck UI が画面幅でレイアウトを変える様子。<b>折りたたみ=シングルカラムの普通の SNS</b>、<b>展開=本領の Deck</b>。
     レイアウト分岐はヒンジ検出ではなく <b>ウィンドウ幅（WindowSizeClass）</b> で駆動するため iPad の可変幅にもそのまま効く。</p>
  <div class="legend">
    <span><b>━</b> カラム = 1つの REQ フィルタ</span>
    <span><b>━</b> 左レール = カラム目次（タップで一瞬ジャンプ）+ 昇格した下タブ</span>
    <span><b>━</b> スレッドは右隣にカラムで開く（NIP-10）</span>
    <span><b>━</b> オフライン時はキャッシュ表示 + 同期保留バナー</span>
  </div>
</div>

<div class="stage" id="stage"></div>

<script>
/* ---------- helpers ---------- */
const NAMES = [
  ["jack","jack@cash.app"],["fiatjaf","fiatjaf@nostr.com"],["hodlonaut","21m@btc"],
  ["snowden","snowden@nostr"],["gigi","dergigi@gigi.np"],["pablof7z","pablo@f7z.io"],
  ["カリン","karin@nostr.jp"],["みやび","miyabi@yakihonne"],["sat🛰","sat@relay.tokyo"],
  ["ODELL","odell@citadel"],["preston","preston@swan"],["lyn","lynalden@macro"]
];
function grad(seed){
  let h=0; for(const c of seed) h=(h*31+c.charCodeAt(0))>>>0;
  const a=h%360, b=(h>>3)%360;
  return `linear-gradient(135deg, hsl(${a} 65% 55%), hsl(${b} 70% 42%))`;
}
function avatar(seed,cls=""){ return `<div class="avatar ${cls}" style="background:${grad(seed)}"></div>`; }

const ICONS = {
  search:'<path d="M11 19a8 8 0 1 0 0-16 8 8 0 0 0 0 16z"/><path d="m21 21-4.3-4.3"/>',
  bell:'<path d="M18 8a6 6 0 0 0-12 0c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.7 21a2 2 0 0 1-3.4 0"/>',
  home:'<path d="m3 9 9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>',
  mail:'<rect x="2" y="4" width="20" height="16" rx="2"/><path d="m2 7 10 6 10-6"/>',
  user:'<circle cx="12" cy="8" r="4"/><path d="M4 21a8 8 0 0 1 16 0"/>',
  grip:'<circle cx="9" cy="6" r="1"/><circle cx="15" cy="6" r="1"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><circle cx="9" cy="18" r="1"/><circle cx="15" cy="18" r="1"/>',
  reply:'<path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>',
  repost:'<path d="m17 2 4 4-4 4"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/><path d="m7 22-4-4 4-4"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>',
  zap:'<path d="M13 2 4 14h7l-1 8 9-12h-7z"/>',
  heart:'<path d="M19 14c1.5-1.5 3-3.5 3-6a4 4 0 0 0-7-2.6A4 4 0 0 0 8 8c0 2.5 1.5 4.5 3 6l5 5z"/>',
  cog:'<circle cx="12" cy="12" r="3"/><path d="M19 12a7 7 0 0 0-.1-1l2-1.5-2-3.5-2.3 1a7 7 0 0 0-1.7-1L16.5 3h-4l-.4 2.5a7 7 0 0 0-1.7 1l-2.3-1-2 3.5L5 11a7 7 0 0 0 0 2l-2 1.5 2 3.5 2.3-1a7 7 0 0 0 1.7 1l.4 2.5h4l.4-2.5a7 7 0 0 0 1.7-1l2.3 1 2-3.5-2-1.5a7 7 0 0 0 .1-1z"/>',
  plus:'<path d="M12 5v14M5 12h14"/>',
  x:'<path d="M18 6 6 18M6 6l12 12"/>',
  list:'<path d="M8 6h13M8 12h13M8 18h13"/><circle cx="3.5" cy="6" r="1"/><circle cx="3.5" cy="12" r="1"/><circle cx="3.5" cy="18" r="1"/>',
  send:'<path d="m22 2-7 20-4-9-9-4z"/><path d="M22 2 11 13"/>',
  hash:'<path d="M4 9h16M4 15h16M10 3 8 21M16 3l-2 18"/>',
  pin:'<path d="M12 17v5M9 3h6l-1 6 3 3v2H7v-2l3-3z"/>',
  star:'<path d="m12 3 2.9 5.9 6.5.9-4.7 4.6 1.1 6.5L12 18l-5.8 3 1.1-6.5L2.6 9.8l6.5-.9z"/>'
};
const ico = (k,cls='i')=>`<svg class="${cls}" viewBox="0 0 24 24">${ICONS[k]}</svg>`;

const POSTS = [
  {t:"nostr is the protocol the web should have shipped in 1994. no platform, no gatekeeper, just signed events.", img:false, c:42,r:88,z:"12.4k",l:210},
  {t:"フォルダブルで開いたときに複数カラム見えるの、Deck系クライアントの本領だわ。畳むと普通のSNSに戻るのが理想。", img:false, c:8,r:15,z:"2.1k",l:54},
  {t:"just zapped this dev 5000 sats for the relay patch ⚡ value-for-value actually works", img:false, c:3,r:9,z:"5k",l:31},
  {t:"new <span class='tag'>#nostr</span> client preview — offline-first, cache everything, sync on wifi 👇", img:true, c:120,r:240,z:"88k",l:980},
  {t:"reminder: your <span class='ment'>npub</span> is your identity. back up your nsec. no password reset on a protocol.", img:false, c:64,r:300,z:"40k",l:512},
  {t:"running my own relay on a raspberry pi at home. negentropy sync makes reconnects basically free.", img:false, c:11,r:22,z:"3.3k",l:77},
  {t:"the outbox model (NIP-65) finally clicked for me. you fetch from where people actually write. so simple.", img:false, c:19,r:41,z:"6.7k",l:130},
];

function note(i){
  const [name,handle]=NAMES[i%NAMES.length];
  const p=POSTS[i%POSTS.length];
  const times=["12s","1m","4m","18m","1h","3h","7h"];
  return `<div class="note">
    ${avatar(name)}
    <div class="note-main">
      <div class="note-head">
        <span class="name">${name}</span>
        <span class="handle">${handle}</span>
        <span class="time">${times[i%times.length]}</span>
      </div>
      <div class="body">${p.t}</div>
      ${p.img?`<div class="media"><div class="ph" style="background:${grad(name+'img')}"></div></div>`:''}
      <div class="actions">
        <span class="act c">${ico('reply','i sm')} ${p.c}</span>
        <span class="act r">${ico('repost','i sm')} ${p.r}</span>
        <span class="act z">${ico('zap','i sm')} ${p.z}</span>
        <span class="act l">${ico('heart','i sm')} ${p.l}</span>
      </div>
    </div>
  </div>`;
}
function skeleton(){ return `<div class="skeleton">
  <div class="sk" style="width:38px;height:38px;border-radius:50%"></div>
  <div style="flex:1"><div class="sk" style="width:55%;height:11px;margin-bottom:8px"></div>
  <div class="sk" style="width:90%;height:10px;margin-bottom:6px"></div>
  <div class="sk" style="width:70%;height:10px"></div></div></div>`; }
function feed(n,start=0){ let h=''; for(let i=0;i<n;i++) h+=note(start+i); return h; }

/* ---------- column (deck) ---------- */
function column(icon,title,sub,start,offline=false){
  return `<div class="column">
    <div class="col-head">
      <div class="col-icon">${icon}</div>
      <div><div class="col-title">${title}</div><div class="col-sub">${sub}</div></div>
      <span class="grip">${ico('grip','i sm')}</span>
    </div>
    <div class="col-body">
      ${offline?`<div class="offline-pill">⚠ オフライン — キャッシュ表示中・3件の投稿を送信待ち</div>`:''}
      ${feed(7,start)}${skeleton()}
    </div>
  </div>`;
}

/* ---------- left navigation rail (expanded) ---------- */
function railItem(content,{active=false,badge=null,cls=''}={}){
  return `<div class="rail-item ${cls} ${active?'active':''}">${content}
    ${badge?`<span class="badge">${badge}</span>`:''}</div>`;
}
function rail(){
  const colAv=(s,pin=false)=>`<div class="colav" style="background:${grad(s)}"></div>${pin?'<span class="pindot"></span>':''}`;
  return `<div class="rail">
    <div class="logo">N</div>
    <!-- グローバルナビ（compact では下タブ → expanded でここに昇格） -->
    ${railItem(ico('home'),{active:true})}
    ${railItem(ico('search'))}
    ${railItem(ico('bell'),{badge:3})}
    ${railItem(ico('mail'),{badge:1})}
    ${railItem(ico('list'))}  <!-- パブリックチャット一覧を開く -->
    <div class="rail-sep"></div>
    <div class="rail-label">PIN</div>
    <!-- ピン留めカラム = Deck の目次。タップでジャンプ。チャンネル/スレッドも固定可 -->
    ${railItem(`<span class="hash">#</span>`)}
    ${railItem(`<span class="hash">₿</span>`)}
    ${railItem(colAv('Nostr Japan',true),{badge:12})}  <!-- ピン留めチャンネル -->
    ${railItem(colAv('スレッド',true))}                <!-- ピン留めスレッド -->
    ${railItem('＋',{cls:'add'})}
    <div class="spacer"></div>
    ${railItem(ico('cog'))}
    ${railItem(colAv('me'),{cls:'av'})}
  </div>`;
}

/* ---------- thread column (NIP-10) ---------- */
function threadNote(i,{depth=0,root=false,focused=false,replyTo=null}={}){
  const [name,handle]=NAMES[i%NAMES.length];
  const p=POSTS[i%POSTS.length];
  const cls=[root?'root':'',focused?'focused':'',depth>0?`reply depth${depth}`:''].join(' ');
  return `<div class="note ${cls}">
    ${depth>0?`<div class="thread-line"></div>`:''}
    ${avatar(name)}
    <div class="note-main">
      ${replyTo?`<div class="reply-to">返信先 <b>@${replyTo}</b></div>`:''}
      <div class="note-head"><span class="name">${name}</span>
        <span class="handle">${handle}</span><span class="time">${root?'2h':'1h'}</span></div>
      <div class="body">${p.t}</div>
      <div class="actions">
        <span class="act c">${ico('reply','i sm')} ${p.c}</span>
        <span class="act r">${ico('repost','i sm')} ${p.r}</span>
        <span class="act z">${ico('zap','i sm')} ${p.z}</span>
        <span class="act l">${ico('heart','i sm')} ${p.l}</span>
      </div>
    </div>
  </div>`;
}
function threadColumn(){
  return `<div class="column thread">
    <div class="col-head">
      <div class="col-icon">${ico('reply','i sm')}</div>
      <div style="flex:1"><div class="col-title">スレッド</div><div class="col-sub">一時表示 · NIP-10 · 12 replies</div></div>
      <span class="head-btn" title="このスレッドを固定">${ico('pin','i sm')}</span>
      <span class="col-close">${ico('x','i sm')}</span>
    </div>
    <div class="col-body">
      ${threadNote(0,{root:true})}
      ${threadNote(4,{depth:1,focused:true,replyTo:'jack'})}
      ${threadNote(2,{depth:2,replyTo:'gigi'})}
      ${threadNote(1,{depth:1,replyTo:'jack'})}
      ${threadNote(3,{depth:2,replyTo:'fiatjaf'})}
      ${skeleton()}
    </div>
  </div>`;
}

/* ---------- NIP-28: channel list column (kind:40/41) ---------- */
const CHANNELS = [
  ["Nostr Japan","日本語のNostr雑談",  "カリン","次のミートアップ来る人ー？", 12, 340, true],
  ["Bitcoin Talk","price & tech",      "ODELL","self-custody is not optional", 3, 1280, false],
  ["#dev-help","client devs hangout",  "pablof7z","NIP-28 の kind:42 はここ", 0, 92, false],
  ["Photography","📷 share your shots", "みやび","桜の写真あげました", 1, 210, false],
  ["Relay Ops","running your own relay","sat🛰","negentropy 効くと爆速", 0, 58, false],
];
function channelListColumn(){
  const rows = CHANNELS.map(([name,about,who,last,unread,members,active])=>`
    <div class="ch-row ${active?'active':''}">
      <div class="ch-pic" style="background:${grad(name)}"></div>
      <div class="ch-main">
        <div class="ch-top"><span class="ch-name">${name}</span>
          <span class="ch-meta">👤 ${members}</span></div>
        <div class="ch-last"><b>${who}:</b> ${last}</div>
      </div>
      ${unread?`<span class="ch-unread">${unread}</span>`:''}
      <span class="ch-pin ${active?'on':''}" title="ピン留め">${ico('pin','i sm')}</span>
    </div>`).join('');
  return `<div class="column">
    <div class="col-head">
      <div class="col-icon">${ico('hash','i sm')}</div>
      <div><div class="col-title">パブリックチャット</div><div class="col-sub">NIP-28 · channels</div></div>
      <span class="grip">${ico('grip','i sm')}</span>
    </div>
    <div class="col-body">${rows}${skeleton()}</div>
  </div>`;
}

/* ---------- NIP-28: channel room column (kind:42, chat) ---------- */
function msg(i,{me=false,cont=false}={}){
  const [name]=NAMES[i%NAMES.length];
  const texts=["次のミートアップ来る人ー？","渋谷だっけ？","21日の19時〜です 🍻","行きます！","kind:42 のメッセージ、ここに流れる",
    "NIP-10 マーカーで返信もできるよ","モデレーションは kind:43/44 ね","了解、実装する"];
  return `<div class="msg ${me?'me':''} ${cont?'cont':''}">
    ${avatar(name)}
    <div class="msg-b">
      <div class="msg-head"><span class="msg-name">${me?'あなた':name}</span><span class="msg-time">19:0${i%6}</span></div>
      <div class="bubble">${texts[i%texts.length]}</div>
    </div>
  </div>`;
}
function channelRoomColumn(){
  return `<div class="column room">
    <div class="col-head">
      <div class="col-icon">${ico('hash','i sm')}</div>
      <div style="flex:1"><div class="col-title">Nostr Japan</div><div class="col-sub">📌 固定済 · 👤 340 · kind:42</div></div>
      <span class="head-btn pinned" title="固定を解除">${ico('pin','i sm')}</span>
      <span class="col-close">${ico('x','i sm')}</span>
    </div>
    <div class="col-body">
      <div class="room-scroll">
        <div class="daysep"><span>今日</span></div>
        ${msg(0)}${msg(1)}
        ${msg(4)}${msg(5,{cont:true})}
        ${msg(3,{me:true})}
        ${msg(6)}
        ${msg(7,{me:true})}
      </div>
      <div class="composer">
        <div class="inp">メッセージを入力…</div>
        <div class="send">${ico('send','i sm')}</div>
      </div>
    </div>
  </div>`;
}

function publicChatFrame(){
  return `<div class="frame tablet">
    <div class="frame-label"><b>Public Chat (NIP-28)</b>チャンネル一覧 → タップでルーム（kind:42 をチャット表示）</div>
    <div class="device"><div class="screen">
      ${statusbar()}
      <div class="body-row">
        ${rail()}
        <div class="deck">
          ${channelListColumn()}
          ${channelRoomColumn()}
          ${column(ico('home','i sm'),'フォロー中','following',0)}
        </div>
      </div>
    </div></div>
  </div>`;
}

/* ---------- frames ---------- */
function statusbar(){ return `<div class="statusbar"><span>9:41</span>
  <span class="right">5G &nbsp; 100%</span></div>`; }

function phoneFolded(){
  return `<div class="frame phone">
    <div class="frame-label"><b>折りたたみ時 (Compact)</b>シングルカラム / 普通の SNS</div>
    <div class="device"><div class="screen">
      <div class="notch"></div>
      ${statusbar()}
      <div class="appbar"><span class="title">ホーム</span><span class="spacer"></span>
        <span class="icon-btn">${ico('search')}</span></div>
      <div class="tabs">
        <span class="chip active">フォロー中</span><span class="chip">#nostr</span>
        <span class="chip">通知</span><span class="chip">DM</span><span class="chip">グローバル</span>
      </div>
      <div class="feed">${feed(8)}${skeleton()}</div>
      <div class="fab">＋</div>
      <div class="bottomnav">
        <span class="icon-btn active">${ico('home')}</span>
        <span class="icon-btn">${ico('search')}</span>
        <span class="icon-btn">${ico('bell')}</span>
        <span class="icon-btn">${ico('mail')}</span>
        <span class="icon-btn">${ico('user')}</span>
      </div>
    </div></div>
  </div>`;
}

function foldUnfolded(){
  return `<div class="frame fold">
    <div class="frame-label"><b>展開時 (Expanded / フォルダブル)</b>左レール（下タブが昇格）+ Deck</div>
    <div class="device"><div class="screen">
      ${statusbar()}
      <div class="body-row">
        ${rail()}
        <div class="deck">
          ${column(ico('home','i sm'),'フォロー中','following · 2 relays',0)}
          ${column(ico('search','i sm'),'#nostr','hashtag · global',3)}
          ${column(ico('bell','i sm'),'通知','mentions · zaps',1)}
        </div>
      </div>
      <div class="hinge"></div>
    </div></div>
  </div>`;
}

function tablet(){
  return `<div class="frame tablet">
    <div class="frame-label"><b>iPad / Stage Manager (可変幅)</b>左レール + Deck + ノートタップで開くスレッドカラム</div>
    <div class="device"><div class="screen">
      ${statusbar()}
      <div class="body-row">
        ${rail()}
        <div class="deck">
          ${column(ico('home','i sm'),'フォロー中','following',0)}
          ${column(ico('search','i sm'),'#bitcoin','hashtag',5)}
          ${threadColumn()}
          ${column(ico('bell','i sm'),'通知','mentions · zaps',2,true)}
        </div>
      </div>
    </div></div>
  </div>`;
}

document.getElementById('stage').innerHTML =
  phoneFolded() + foldUnfolded() + tablet() + publicChatFrame();
</script>
</body>
